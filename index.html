<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Game 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.screen {
    display: none;
    flex-direction: column;
    align-items: center;
    color: #d43f6b;
}

.active {
    display: flex;
}

button {
    font-size: 1.5em;
    padding: 15px 30px;
    border-radius: 50px;
    border: none;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #d43f6b;
}

#image {
    max-width: 300px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.whatsapp {
    background: #25D366;
}

.typewriter {
    font-size: 1.8em;
    min-height: 80px;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div class="screen active" id="screen1">
    <h1>💖 A Little Game For You 💖</h1>
    <button onclick="startGame()">✨ Tap to Begin ✨</button>
</div>

<!-- Screen 2 -->
<div class="screen" id="screen2">
    <div class="typewriter" id="message"></div>
    <button onclick="goToSurprise()">💫 Continue 💫</button>
</div>

<!-- Screen 3 -->
<div class="screen" id="screen3">
    <h1>💥 Ready for your surprise? 💥</h1>
    <button onclick="showSurprise()">🎁 Reveal 🎁</button>
</div>

<!-- Screen 4 -->
<div class="screen" id="screen4">
    <h2>💖 This is for you 💖</h2>
    <img id="image">
    
    <button class="whatsapp" onclick="shareWhatsApp()">📱 Send to My Love 💬</button>
    <button onclick="restartGame()">🔁 Try Again</button>
</div>

<script>

let selectedImage = null;

// Switch screen
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Start game
function startGame() {
    showScreen("screen2");
    typeMessage("Every click brings you closer to something special... 💖");
}

// Typewriter effect
function typeMessage(text) {
    let i = 0;
    let el = document.getElementById("message");
    el.innerHTML = "";

    let interval = setInterval(() => {
        el.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

// Go to surprise screen
function goToSurprise() {
    showScreen("screen3");
}

// Show surprise
function showSurprise() {
    showScreen("screen4");

    // Random image
    let num = Math.floor(Math.random() * 48) + 1;
    selectedImage = num;

    let formatted = num.toString().padStart(2, '0');
    document.getElementById("image").src = `images/${formatted}.jpg`;

    // Blast 💥
    document.body.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.2)' },
        { transform: 'scale(1)' }
    ], { duration: 500 });

    confetti();
}

// Confetti 🎉
function confetti() {
    for (let i = 0; i < 100; i++) {
        let el = document.createElement("div");
        el.innerHTML = ["💖","💕","✨","🫂","🌸"][Math.floor(Math.random()*5)];
        el.style.position = "fixed";
        el.style.left = Math.random()*100 + "%";
        el.style.top = "-20px";
        el.style.fontSize = "20px";
        document.body.appendChild(el);

        el.animate([
            { transform: "translateY(0)", opacity: 1 },
            { transform: "translateY(100vh)", opacity: 0 }
        ], {
            duration: 2000 + Math.random()*2000
        });

        setTimeout(() => el.remove(), 4000);
    }
}

// Share to WhatsApp
function shareWhatsApp() {
    let num = selectedImage.toString().padStart(2, '0');

    let message =
        `💖 I just played your love game 💖%0A` +
        `I got surprise #${num} 😍%0A` +
        `Come see it 💕`;

    let phone = "923086649113";

    let url = `https://wa.me/${phone}?text=${message}`;
    window.open(url, '_blank');
}

// Restart
function restartGame() {
    showScreen("screen1");
}

</script>

</body>
</html>
