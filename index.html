<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Surprise for My Love 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    color: #d43f6b;
}

button {
    font-size: 2em;
    padding: 20px 40px;
    border-radius: 50px;
    border: none;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #d43f6b;
}

#imageContainer {
    display: none;
    margin-top: 20px;
}

img {
    max-width: 300px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">
    <h1>💖 Click for Surprise 💖</h1>
    <button onclick="showSurprise()">✨ Click Me ✨</button>

    <div id="imageContainer">
        <h2>For You ❤️</h2>
        <img id="randomImage" src="">
    </div>
</div>

<script>

function showSurprise() {

    // Hide button
    document.querySelector("button").style.display = "none";

    // BLAST EFFECT 💥
    document.body.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.2)' },
        { transform: 'scale(1)' }
    ], {
        duration: 500
    });

    // Random image (01–48)
    let num = Math.floor(Math.random() * 48) + 1;
    let formatted = num.toString().padStart(2, '0');

    let img = document.getElementById("randomImage");
    img.src = `images/${formatted}.jpg`;

    document.getElementById("imageContainer").style.display = "block";

    // CONFETTI 🎉
    for (let i = 0; i < 80; i++) {
        let el = document.createElement("div");
        el.innerHTML = ["💖","💕","✨","🫂","🌸"][Math.floor(Math.random()*5)];
        el.style.position = "fixed";
        el.style.left = Math.random()*100 + "%";
        el.style.top = "-20px";
        el.style.fontSize = "20px";
        document.body.appendChild(el);

        el.animate([
            { transform: "translateY(0)", opacity: 1 },
            { transform: "translateY(100vh)", opacity: 0 }
        ], {
            duration: 2000 + Math.random()*2000
        });

        setTimeout(() => el.remove(), 4000);
    }
}

</script>

</body>
</html>
